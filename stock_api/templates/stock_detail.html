<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票详情 - 股票系统管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #f5f7fa; }
        .sidebar { background: #343a40; min-height: 100vh; position: fixed; width: 220px; }
        .sidebar a { color: #adb5bd; text-decoration: none; padding: 12px 20px; display: block; }
        .sidebar a:hover, .sidebar a.active { background: #495057; color: white; }
        .main-content { margin-left: 220px; padding: 20px; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <div class="col-md-2 sidebar p-0">
                <div class="p-3 text-white text-center border-bottom border-secondary">
                    <h5><i class="bi bi-graph-up-arrow"></i> 股票后台</h5>
                </div>
                <a href="/templates/dashboard.html"><i class="bi bi-grid me-2"></i>仪表盘</a>
                <a href="/templates/sync.html"><i class="bi bi-arrow-repeat me-2"></i>同步控制</a>
                <a href="/templates/stocks.html"><i class="bi bi-collection me-2"></i>股票列表</a>
                <a href="/templates/factors.html"><i class="bi bi-calculator me-2"></i>因子计算</a>
                <a href="/templates/strategy.html"><i class="bi bi-lightning me-2"></i>选股策略</a>
                <a href="/templates/data_management.html"><i class="bi bi-database me-2"></i>数据管理</a>
                <a href="/templates/monitor.html"><i class="bi bi-bell me-2"></i>监控告警</a>
                <a href="/templates/settings.html"><i class="bi bi-gear me-2"></i>系统设置</a>
                <a href="#" id="logoutBtn"><i class="bi bi-box-arrow-right me-2"></i>退出登录</a>
            </div>
            
            <!-- 主内容 -->
            <div class="col-md-10 main-content">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 id="stockTitle">股票详情</h4>
                    <a href="/templates/stocks.html" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left me-1"></i>返回列表
                    </a>
                </div>
                
                <!-- 基本信息 -->
                <div class="row mb-4">
                    <div class="col-md-3">
                        <div class="card">
                            <div class="card-body text-center">
                                <div class="text-muted">最新价</div>
                                <h2 id="latestPrice" class="mb-0">-</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card">
                            <div class="card-body text-center">
                                <div class="text-muted">涨跌幅</div>
                                <h2 id="pctChg" class="mb-0">-</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card">
                            <div class="card-body text-center">
                                <div class="text-muted">最高</div>
                                <h4 id="highPrice" class="mb-0">-</h4>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card">
                            <div class="card-body text-center">
                                <div class="text-muted">最低</div>
                                <h4 id="lowPrice" class="mb-0">-</h4>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 图表 -->
                <div class="card mb-4">
                    <div class="card-body">
                        <h5 class="card-title">历史行情</h5>
                        <canvas id="priceChart" height="100"></canvas>
                    </div>
                </div>
                
                <!-- 历史数据 -->
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">历史数据</h5>
                        <table class="table table-sm">
                            <thead>
                                <tr>
                                    <th>日期</th>
                                    <th>开盘</th>
                                    <th>最高</th>
                                    <th>最低</th>
                                    <th>收盘</th>
                                    <th>成交量</th>
                                </tr>
                            </thead>
                            <tbody id="historyTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/templates/login.html';
        
        // 获取股票代码
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        
        document.getElementById('stockTitle').textContent = code + ' 股票详情';
        
        async function loadDetail() {
            try {
                const res = await fetch(API_BASE + '/api/stocks/' + code + '?days=30', {
                    headers: {'Authorization': 'Bearer ' + token}
                });
                
                if (!res.ok) {
                    alert('未找到股票数据');
                    return;
                }
                
                const data = await res.json();
                
                // 基本信息
                document.getElementById('latestPrice').textContent = data.latest.close.toFixed(2);
                const pctEl = document.getElementById('pctChg');
                pctEl.textContent = (data.pct_chg >= 0 ? '+' : '') + data.pct_chg.toFixed(2) + '%';
                pctEl.className = 'mb-0 ' + (data.pct_chg >= 0 ? 'text-success' : 'text-danger');
                document.getElementById('highPrice').textContent = data.latest.high.toFixed(2);
                document.getElementById('lowPrice').textContent = data.latest.low.toFixed(2);
                
                // 渲染图表
                renderChart(data.history);
                
                // 渲染表格
                const tbody = document.getElementById('historyTable');
                tbody.innerHTML = data.history.map(h => `
                    <tr>
                        <td>${h.date}</td>
                        <td>${h.open.toFixed(2)}</td>
                        <td>${h.high.toFixed(2)}</td>
                        <td>${h.low.toFixed(2)}</td>
                        <td>${h.close.toFixed(2)}</td>
                        <td>${(h.volume/10000).toFixed(2)}万</td>
                    </tr>
                `).join('');
                
            } catch (err) {
                console.error(err);
            }
        }
        
        let chart = null;
        function renderChart(history) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            
            if (chart) chart.destroy();
            
            const labels = history.map(h => h.date).reverse();
            const prices = history.map(h => h.close).reverse();
            
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '收盘价',
                        data: prices,
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } }
                }
            });
        }
        
        loadDetail();
        
        // 退出登录
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await fetch(API_BASE + '/api/auth/logout', {
                method: 'POST',
                headers: {'Authorization': 'Bearer ' + token}
            });
            localStorage.clear();
            window.location.href = '/templates/login.html';
        });
    </script>
</body>
</html>
