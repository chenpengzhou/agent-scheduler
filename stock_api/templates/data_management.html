<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据管理 - 股票系统管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f5f7fa; }
        .sidebar { background: #343a40; min-height: 100vh; position: fixed; width: 220px; }
        .sidebar a { color: #adb5bd; text-decoration: none; padding: 12px 20px; display: block; }
        .sidebar a:hover, .sidebar a.active { background: #495057; color: white; }
        .main-content { margin-left: 220px; padding: 20px; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar p-0">
                <div class="p-3 text-white text-center border-bottom border-secondary">
                    <h5><i class="bi bi-graph-up-arrow"></i> 股票后台</h5>
                </div>
                <a href="/templates/dashboard.html"><i class="bi bi-grid me-2"></i>仪表盘</a>
                <a href="/templates/sync.html"><i class="bi bi-arrow-repeat me-2"></i>同步控制</a>
                <a href="/templates/stocks.html"><i class="bi bi-collection me-2"></i>股票列表</a>
                <a href="/templates/factors.html"><i class="bi bi-calculator me-2"></i>因子计算</a>
                <a href="/templates/data_management.html" class="active"><i class="bi bi-database me-2"></i>数据管理</a>
                <a href="/templates/strategy.html"><i class="bi bi-lightning me-2"></i>选股策略</a>
                <a href="/templates/monitor.html"><i class="bi bi-bell me-2"></i>监控告警</a>
                <a href="/templates/settings.html"><i class="bi bi-gear me-2"></i>系统设置</a>
                <a href="#" id="logoutBtn"><i class="bi bi-box-arrow-right me-2"></i>退出登录</a>
            </div>
            
            <div class="col-md-10 main-content">
                <h4 class="mb-4">数据管理</h4>
                
                <!-- 数据质量 -->
                <div class="card mb-4">
                    <div class="card-body">
                        <h5 class="card-title">数据质量报告</h5>
                        <div class="row mt-3">
                            <div class="col-md-3">
                                <p class="text-muted mb-1">总记录</p>
                                <h3 id="totalRecords">-</h3>
                            </div>
                            <div class="col-md-3">
                                <p class="text-muted mb-1">股票数量</p>
                                <h3 id="stockCount">-</h3>
                            </div>
                            <div class="col-md-3">
                                <p class="text-muted mb-1">有效率</p>
                                <h3 id="validRate">-</h3>
                            </div>
                            <div class="col-md-3">
                                <p class="text-muted mb-1">日期范围</p>
                                <h6 id="dateRange">-</h6>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 手动补数据 -->
                <div class="card mb-4">
                    <div class="card-body">
                        <h5 class="card-title">手动补数据</h5>
                        <div class="row mt-3">
                            <div class="col-md-3">
                                <input type="text" class="form-control" id="stockCode" placeholder="股票代码">
                            </div>
                            <div class="col-md-3">
                                <input type="text" class="form-control" id="startDate" placeholder="开始日期 YYYYMMDD">
                            </div>
                            <div class="col-md-3">
                                <input type="text" class="form-control" id="endDate" placeholder="结束日期 YYYYMMDD">
                            </div>
                            <div class="col-md-3">
                                <button class="btn btn-primary" onclick="backfill()">补数据</button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 导出数据 -->
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">导出数据</h5>
                        <div class="row mt-3">
                            <div class="col-md-4">
                                <select class="form-select" id="exportFormat">
                                    <option value="csv">CSV</option>
                                    <option value="excel">Excel</option>
                                    <option value="json">JSON</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <input type="text" class="form-control" id="exportStocks" placeholder="股票代码(逗号分隔)">
                            </div>
                            <div class="col-md-4">
                                <button class="btn btn-success" onclick="exportData()">导出</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/templates/login.html';
        
        async function loadQualityReport() {
            try {
                const res = await fetch(API_BASE + '/api/admin/data/quality', {
                    headers: {'Authorization': 'Bearer ' + token}
                });
                
                if (!res.ok) {
                    document.getElementById('totalRecords').textContent = '无法加载';
                    return;
                }
                
                const data = await res.json();
                
                document.getElementById('totalRecords').textContent = (data.total_records || 0).toLocaleString();
                document.getElementById('stockCount').textContent = data.stock_count || 0;
                document.getElementById('validRate').textContent = (data.valid_rate || 0) + '%';
                
                if (data.date_range && data.date_range.start) {
                    document.getElementById('dateRange').textContent = data.date_range.start + ' ~ ' + data.date_range.end;
                } else {
                    document.getElementById('dateRange').textContent = '暂无数据';
                }
            } catch (err) {
                console.error(err);
                document.getElementById('totalRecords').textContent = '加载失败';
                document.getElementById('stockCount').textContent = '-';
                document.getElementById('validRate').textContent = '-';
                document.getElementById('dateRange').textContent = '-';
            }
        }
        
        async function backfill() {
            const code = document.getElementById('stockCode').value;
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            
            try {
                const res = await fetch(API_BASE + '/api/admin/data/backfill?stock_code=' + code + 
                    '&start_date=' + start + '&end_date=' + end, {
                    headers: {'Authorization': 'Bearer ' + token}
                });
                alert('补数据任务已创建');
            } catch (err) {
                alert('操作失败');
            }
        }
        
        async function exportData() {
            const format = document.getElementById('exportFormat').value;
            const stocks = document.getElementById('exportStocks').value;
            
            try {
                const res = await fetch(API_BASE + '/api/admin/data/export?format=' + format + 
                    '&stocks=' + stocks, {
                    headers: {'Authorization': 'Bearer ' + token}
                });
                const data = await res.json();
                alert('导出成功: ' + data.filepath);
            } catch (err) {
                alert('导出失败');
            }
        }
        
        loadQualityReport();
        
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await fetch(API_BASE + '/api/auth/logout', {
                method: 'POST',
                headers: {'Authorization': 'Bearer ' + token}
            });
            localStorage.clear();
            window.location.href = '/templates/login.html';
        });
    </script>
</body>
</html>
