<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>同步控制 - 股票系统管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f5f7fa; }
        .sidebar { background: #343a40; min-height: 100vh; }
        .sidebar a { color: #adb5bd; text-decoration: none; padding: 12px 20px; display: block; }
        .sidebar a:hover, .sidebar a.active { background: #495057; color: white; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <div class="col-md-2 sidebar p-0">
                <div class="p-3 text-white text-center border-bottom border-secondary">
                    <h5>股票管理后台</h5>
                </div>
                <a href="/templates/dashboard.html"><i class="bi bi-grid me-2"></i>数据总览</a>
                <a href="/templates/sync.html" class="active"><i class="bi bi-arrow-repeat me-2"></i>同步控制</a>
                <a href="/templates/stocks.html"><i class="bi bi-collection me-2"></i>股票列表</a>
                <a href="/templates/factors.html"><i class="bi bi-graph-up me-2"></i>因子展示</a>
                <a href="#" id="logoutBtn"><i class="bi bi-box-arrow-right me-2"></i>退出登录</a>
            </div>
            
            <!-- 主内容 -->
            <div class="col-md-10 p-4">
                <h4 class="mb-4">同步控制</h4>
                
                <!-- 同步状态 -->
                <div class="card mb-4">
                    <div class="card-body">
                        <h5 class="card-title">当前状态</h5>
                        <div class="row mt-3">
                            <div class="col-md-3">
                                <p class="mb-1 text-muted">状态</p>
                                <h4><span id="statusBadge" class="badge bg-secondary">-</span></h4>
                            </div>
                            <div class="col-md-3">
                                <p class="mb-1 text-muted">总股票数</p>
                                <h4 id="totalStocks">-</h4>
                            </div>
                            <div class="col-md-3">
                                <p class="mb-1 text-muted">已完成</p>
                                <h4 id="completedStocks">-</h4>
                            </div>
                            <div class="col-md-3">
                                <p class="mb-1 text-muted">进度</p>
                                <h4 id="progress">-</h4>
                            </div>
                        </div>
                        
                        <div class="mt-4">
                            <p class="mb-1 text-muted">当前处理</p>
                            <p id="currentStock" class="h5">-</p>
                        </div>
                        
                        <hr>
                        
                        <div class="d-flex gap-2">
                            <button class="btn btn-success" id="startBtn">
                                <i class="bi bi-play me-1"></i>启动同步
                            </button>
                            <button class="btn btn-danger" id="stopBtn">
                                <i class="bi bi-stop me-1"></i>停止同步
                            </button>
                            <button class="btn btn-outline-secondary" id="refreshBtn">
                                <i class="bi bi-arrow-clockwise me-1"></i>刷新
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- 日志 -->
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">同步日志</h5>
                        <div id="logContent" class="bg-dark text-light p-3 rounded" style="height: 300px; overflow-y: auto; font-family: monospace; font-size: 12px;">
                            等待同步...
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/templates/login.html';
        
        // 获取状态
        async function loadStatus() {
            try {
                const res = await fetch(API_BASE + '/api/admin/sync/status', {
                    headers: {'Authorization': 'Bearer ' + token}
                });
                if (!res.ok) return;
                
                const data = await res.json();
                
                const statusEl = document.getElementById('statusBadge');
                statusEl.textContent = data.status === 'running' ? '运行中' : '已停止';
                statusEl.className = 'badge ' + (data.status === 'running' ? 'bg-success' : 'bg-secondary');
                
                document.getElementById('totalStocks').textContent = data.total_stocks || 0;
                document.getElementById('completedStocks').textContent = data.completed_stocks || 0;
                document.getElementById('progress').textContent = data.progress ? data.progress + '%' : '0%';
                document.getElementById('currentStock').textContent = data.current_stock || '-';
                
                // 按钮状态
                document.getElementById('startBtn').disabled = data.status === 'running';
                document.getElementById('stopBtn').disabled = data.status !== 'running';
            } catch (err) {
                console.error(err);
            }
        }
        
        // 启动同步
        document.getElementById('startBtn').addEventListener('click', async () => {
            try {
                const res = await fetch(API_BASE + '/api/admin/sync/start', {
                    method: 'POST',
                    headers: {'Authorization': 'Bearer ' + token}
                });
                const data = await res.json();
                alert(data.message);
                loadStatus();
                addLog('同步已启动');
            } catch (err) {
                alert('启动失败');
            }
        });
        
        // 停止同步
        document.getElementById('stopBtn').addEventListener('click', async () => {
            try {
                const res = await fetch(API_BASE + '/api/admin/sync/stop', {
                    method: 'POST',
                    headers: {'Authorization': 'Bearer ' + token}
                });
                const data = await res.json();
                alert(data.message);
                loadStatus();
                addLog('同步已停止');
            } catch (err) {
                alert('停止失败');
            }
        });
        
        // 刷新
        document.getElementById('refreshBtn').addEventListener('click', loadStatus);
        
        function addLog(msg) {
            const log = document.getElementById('logContent');
            const time = new Date().toLocaleTimeString();
            log.innerHTML += `<div>[${time}] ${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }
        
        loadStatus();
        setInterval(loadStatus, 3000);
        
        // 退出登录
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await fetch(API_BASE + '/api/auth/logout', {
                method: 'POST',
                headers: {'Authorization': 'Bearer ' + token}
            });
            localStorage.clear();
            window.location.href = '/templates/login.html';
        });
    </script>
</body>
</html>
