<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票列表 - 股票系统管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f5f7fa; }
        .sidebar { background: #343a40; min-height: 100vh; }
        .sidebar a { color: #adb5bd; text-decoration: none; padding: 12px 20px; display: block; }
        .sidebar a:hover, .sidebar a.active { background: #495057; color: white; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <div class="col-md-2 sidebar p-0">
                <div class="p-3 text-white text-center border-bottom border-secondary">
                    <h5>股票管理后台</h5>
                </div>
                <a href="/templates/dashboard.html"><i class="bi bi-grid me-2"></i>数据总览</a>
                <a href="/templates/sync.html"><i class="bi bi-arrow-repeat me-2"></i>同步控制</a>
                <a href="/templates/stocks.html" class="active"><i class="bi bi-collection me-2"></i>股票列表</a>
                <a href="/templates/factors.html"><i class="bi bi-graph-up me-2"></i>因子展示</a>
                <a href="#" id="logoutBtn"><i class="bi bi-box-arrow-right me-2"></i>退出登录</a>
            </div>
            
            <!-- 主内容 -->
            <div class="col-md-10 p-4">
                <h4 class="mb-4">股票列表</h4>
                
                <!-- 搜索 -->
                <div class="card mb-4">
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-6">
                                <input type="text" class="form-control" id="searchInput" placeholder="搜索股票代码或名称...">
                            </div>
                            <div class="col-md-2">
                                <button class="btn btn-primary w-100" id="searchBtn">
                                    <i class="bi bi-search me-1"></i>搜索
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 股票表格 -->
                <div class="card">
                    <div class="card-body">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>代码</th>
                                    <th>名称</th>
                                    <th>最新价</th>
                                    <th>涨跌幅</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="stockTable">
                                <tr><td colspan="5" class="text-center text-muted">加载中...</td></tr>
                            </tbody>
                        </table>
                        
                        <!-- 分页 -->
                        <nav>
                            <ul class="pagination justify-content-center" id="pagination"></ul>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/templates/login.html';
        
        let currentPage = 1;
        let searchKeyword = '';
        
        async function loadStocks(page = 1) {
            currentPage = page;
            const url = searchKeyword 
                ? `${API_BASE}/api/stocks?page=${page}&page_size=20&search=${encodeURIComponent(searchKeyword)}`
                : `${API_BASE}/api/stocks?page=${page}&page_size=20`;
            
            try {
                const res = await fetch(url, {
                    headers: {'Authorization': 'Bearer ' + token}
                });
                const data = await res.json();
                
                // 渲染表格
                const tbody = document.getElementById('stockTable');
                if (data.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">暂无数据</td></tr>';
                } else {
                    tbody.innerHTML = data.data.map(stock => `
                        <tr>
                            <td>${stock.code}</td>
                            <td>${stock.name || '-'}</td>
                            <td>-</td>
                            <td>-</td>
                            <td>
                                <a href="/templates/stock_detail.html?code=${stock.code}" class="btn btn-sm btn-outline-primary">
                                    详情
                                </a>
                            </td>
                        </tr>
                    `).join('');
                }
                
                // 渲染分页
                renderPagination(data.pages, page);
            } catch (err) {
                console.error(err);
            }
        }
        
        function renderPagination(totalPages, current) {
            const ul = document.getElementById('pagination');
            let html = '';
            
            if (current > 1) {
                html += `<li class="page-item"><a class="page-link" href="#" onclick="loadStocks(${current-1})">上一页</a></li>`;
            }
            
            for (let i = Math.max(1, current - 2); i <= Math.min(totalPages, current + 2); i++) {
                html += `<li class="page-item ${i === current ? 'active' : ''}">
                    <a class="page-link" href="#" onclick="loadStocks(${i})">${i}</a></li>`;
            }
            
            if (current < totalPages) {
                html += `<li class="page-item"><a class="page-link" href="#" onclick="loadStocks(${current+1})">下一页</a></li>`;
            }
            
            ul.innerHTML = html;
        }
        
        // 搜索
        document.getElementById('searchBtn').addEventListener('click', () => {
            searchKeyword = document.getElementById('searchInput').value;
            loadStocks(1);
        });
        
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchKeyword = e.target.value;
                loadStocks(1);
            }
        });
        
        loadStocks();
        
        // 退出登录
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await fetch(API_BASE + '/api/auth/logout', {
                method: 'POST',
                headers: {'Authorization': 'Bearer ' + token}
            });
            localStorage.clear();
            window.location.href = '/templates/login.html';
        });
    </script>
</body>
</html>
