<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仪表盘 - 股票系统管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #f5f7fa; }
        .sidebar { background: #343a40; min-height: 100vh; position: fixed; width: 220px; }
        .sidebar a { color: #adb5bd; text-decoration: none; padding: 12px 20px; display: block; border-radius: 0; }
        .sidebar a:hover, .sidebar a.active { background: #495057; color: white; }
        .stat-card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-2px); }
        .main-content { margin-left: 220px; padding: 20px; }
        .quick-actions .btn { border-radius: 8px; }
        .loading { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <div class="col-md-2 sidebar p-0">
                <div class="p-3 text-white text-center border-bottom border-secondary">
                    <h5><i class="bi bi-graph-up-arrow"></i> 股票后台</h5>
                </div>
                <a href="/templates/dashboard.html" class="active"><i class="bi bi-grid me-2"></i>仪表盘</a>
                <a href="/templates/sync.html"><i class="bi bi-arrow-repeat me-2"></i>同步控制</a>
                <a href="/templates/stocks.html"><i class="bi bi-collection me-2"></i>股票列表</a>
                <a href="/templates/factors.html"><i class="bi bi-calculator me-2"></i>因子计算</a>
                <a href="/templates/strategy.html"><i class="bi bi-lightning me-2"></i>选股策略</a>
                <a href="/templates/data_management.html"><i class="bi bi-database me-2"></i>数据管理</a>
                <a href="/templates/monitor.html"><i class="bi bi-bell me-2"></i>监控告警</a>
                <a href="/templates/settings.html"><i class="bi bi-gear me-2"></i>系统设置</a>
                <a href="#" id="logoutBtn"><i class="bi bi-box-arrow-right me-2"></i>退出登录</a>
            </div>
            
            <!-- 主内容 -->
            <div class="col-md-10 main-content">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4><i class="bi bi-speedometer2"></i> 仪表盘</h4>
                    <div>
                        <button class="btn btn-sm btn-outline-secondary me-2" onclick="loadDashboard(true)">
                            <i class="bi bi-arrow-clockwise"></i> 刷新
                        </button>
                        <span class="badge bg-secondary" id="cacheStatus"></span>
                    </div>
                </div>
                
                <!-- 快捷操作 -->
                <div class="quick-actions mb-4">
                    <button class="btn btn-primary me-2" onclick="startSync()">
                        <i class="bi bi-play-fill"></i> 启动同步
                    </button>
                    <button class="btn btn-info me-2" onclick="location.href='/templates/strategy.html'">
                        <i class="bi bi-graph-up"></i> 策略回测
                    </button>
                    <button class="btn btn-warning" onclick="location.href='/templates/monitor.html'">
                        <i class="bi bi-bell"></i> 查看告警
                    </button>
                </div>
                
                <!-- 统计卡片 -->
                <div class="row mb-4">
                    <div class="col-md-3">
                        <div class="card stat-card bg-primary text-white">
                            <div class="card-body">
                                <div class="text-white-50"><i class="bi bi-collection"></i> 股票数量</div>
                                <h2 class="mb-0" id="stockCount">-</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card bg-success text-white">
                            <div class="card-body">
                                <div class="text-white-50"><i class="bi bi-database"></i> 数据记录</div>
                                <h2 class="mb-0" id="recordCount">-</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card bg-info text-white">
                            <div class="card-body">
                                <div class="text-white-50"><i class="bi bi-check-circle"></i> 有效率</div>
                                <h2 class="mb-0" id="validRate">-</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card bg-warning text-white">
                            <div class="card-body">
                                <div class="text-white-50"><i class="bi bi-calendar-range"></i> 数据范围</div>
                                <h6 class="mb-0" id="dateRange">-</h6>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 同步状态 & 告警 -->
                <div class="row mb-4">
                    <div class="col-md-6">
                        <div class="card stat-card">
                            <div class="card-body">
                                <h5 class="card-title"><i class="bi bi-arrow-repeat"></i> 同步状态</h5>
                                <div class="mt-3">
                                    <div class="d-flex justify-content-between mb-2">
                                        <span>状态:</span>
                                        <span id="syncStatus" class="badge bg-secondary">-</span>
                                    </div>
                                    <div class="progress mb-3" style="height: 20px;">
                                        <div id="syncProgressBar" class="progress-bar progress-bar-striped progress-bar-animated" 
                                             role="progressbar" style="width: 0%">0%</div>
                                    </div>
                                    <div class="d-flex justify-content-between">
                                        <small class="text-muted">进度:</small>
                                        <small id="syncProgress">0 / 0</small>
                                    </div>
                                    <div class="d-flex justify-content-between">
                                        <small class="text-muted">当前:</small>
                                        <small id="syncCurrent">-</small>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card stat-card">
                            <div class="card-body">
                                <h5 class="card-title"><i class="bi bi-bell"></i> 最新告警</h5>
                                <div id="alertsList" class="mt-3">
                                    <p class="text-muted">暂无告警</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 系统信息 -->
                <div class="card stat-card">
                    <div class="card-body">
                        <h5 class="card-title"><i class="bi bi-info-circle"></i> 系统信息</h5>
                        <div class="row mt-3">
                            <div class="col-md-4">
                                <p><strong>版本:</strong> <span id="sysVersion">1.1.0</span></p>
                            </div>
                            <div class="col-md-4">
                                <p><strong>运行时间:</strong> <span id="sysUptime">-</span></p>
                            </div>
                            <div class="col-md-4">
                                <p><strong>当前用户:</strong> <span id="sysUser">-</span></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        const CACHE_KEY = 'dashboard_cache';
        const CACHE_TTL = 5 * 60 * 1000; // 5分钟缓存
        
        // 检查登录
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/templates/login.html';
        
        // 获取当前用户
        async function getCurrentUser() {
            try {
                const res = await fetch(API_BASE + '/api/auth/me', {
                    headers: {'Authorization': 'Bearer ' + token}
                });
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('sysUser').textContent = data.username + ' (' + data.role + ')';
                }
            } catch (err) {}
        }
        
        // 缓存管理
        function getCache(key) {
            try {
                const cached = localStorage.getItem(key);
                if (!cached) return null;
                
                const { data, timestamp } = JSON.parse(cached);
                if (Date.now() - timestamp < CACHE_TTL) {
                    return data;
                }
            } catch (e) {}
            return null;
        }
        
        function setCache(key, data) {
            try {
                localStorage.setItem(key, JSON.stringify({
                    data,
                    timestamp: Date.now()
                }));
            } catch (e) {}
        }
        
        // 并行请求获取所有数据
        async function loadDashboard(forceRefresh = false) {
            const mainContent = document.querySelector('.main-content');
            mainContent.classList.add('loading');
            
            // 尝试从缓存获取
            const cached = !forceRefresh ? getCache(CACHE_KEY) : null;
            
            if (cached) {
                document.getElementById('cacheStatus').textContent = '缓存';
                renderDashboard(cached);
                mainContent.classList.remove('loading');
                return;
            }
            
            document.getElementById('cacheStatus').textContent = '加载中...';
            
            try {
                // 并行请求 - 优化性能
                const [qualityRes, syncRes, alertsRes, sysRes] = await Promise.all([
                    fetch(API_BASE + '/api/admin/data/quality', {
                        headers: {'Authorization': 'Bearer ' + token}
                    }),
                    fetch(API_BASE + '/api/admin/data/sync/status', {
                        headers: {'Authorization': 'Bearer ' + token}
                    }),
                    fetch(API_BASE + '/api/admin/monitor/alerts', {
                        headers: {'Authorization': 'Bearer ' + token}
                    }),
                    fetch(API_BASE + '/api/admin/settings/info', {
                        headers: {'Authorization': 'Bearer ' + token}
                    })
                ]);
                
                if (!qualityRes.ok) {
                    alert('请重新登录');
                    window.location.href = '/templates/login.html';
                    return;
                }
                
                const [quality, sync, alerts, sysInfo] = await Promise.all([
                    qualityRes.json(),
                    syncRes.json(),
                    alertsRes.json(),
                    sysRes.json()
                ]);
                
                const data = { quality, sync, alerts, sysInfo };
                
                // 保存到缓存
                setCache(CACHE_KEY, data);
                document.getElementById('cacheStatus').textContent = '最新';
                
                renderDashboard(data);
                
            } catch (err) {
                console.error(err);
                alert('加载失败，请刷新重试');
            } finally {
                mainContent.classList.remove('loading');
            }
        }
        
        // 渲染数据
        function renderDashboard(data) {
            const { quality, sync, alerts, sysInfo } = data;
            
            // 统计数据
            document.getElementById('stockCount').textContent = quality.stock_count || 0;
            document.getElementById('recordCount').textContent = (quality.total_records || 0).toLocaleString();
            document.getElementById('validRate').textContent = (quality.valid_rate || 0) + '%';
            
            if (quality.date_range && quality.date_range.start) {
                document.getElementById('dateRange').textContent = 
                    quality.date_range.start + ' ~ ' + quality.date_range.end;
            } else {
                document.getElementById('dateRange').textContent = '暂无数据';
            }
            
            // 同步状态
            const statusEl = document.getElementById('syncStatus');
            statusEl.textContent = sync.status === 'running' ? '运行中' : '空闲';
            statusEl.className = 'badge ' + (sync.status === 'running' ? 'bg-success' : 'bg-secondary');
            
            const progress = sync.progress || 0;
            const progressBar = document.getElementById('syncProgressBar');
            progressBar.style.width = progress + '%';
            progressBar.textContent = progress + '%';
            
            document.getElementById('syncProgress').textContent = 
                (sync.completed_stocks || 0) + ' / ' + (sync.total_stocks || 0);
            document.getElementById('syncCurrent').textContent = sync.current_stock || '-';
            
            // 告警
            const alertsList = document.getElementById('alertsList');
            const totalAlerts = (alerts.price_alerts?.length || 0) + (alerts.volume_alerts?.length || 0);
            
            if (totalAlerts > 0) {
                alertsList.innerHTML = alerts.price_alerts?.slice(0, 3).map(a => 
                    '<div class="alert alert-danger py-2"><i class="bi bi-exclamation-triangle"></i> ' + 
                    a.ts_code + ': ' + a.change_pct?.toFixed(2) + '%</div>'
                ).join('') || '';
            } else {
                alertsList.innerHTML = '<p class="text-muted"><i class="bi bi-check-circle"></i> 暂无告警</p>';
            }
            
            // 系统信息
            document.getElementById('sysVersion').textContent = sysInfo.version || '1.1.0';
        }
        
        // 启动同步
        async function startSync() {
            try {
                const res = await fetch(API_BASE + '/api/admin/data/sync/start', {
                    method: 'POST',
                    headers: {'Authorization': 'Bearer ' + token}
                });
                const data = await res.json();
                alert(data.message || '同步已启动');
                loadDashboard(true); // 强制刷新
            } catch (err) {
                alert('启动失败');
            }
        }
        
        // 初始化
        getCurrentUser();
        loadDashboard();
        
        // 退出登录
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await fetch(API_BASE + '/api/auth/logout', {
                method: 'POST',
                headers: {'Authorization': 'Bearer ' + token}
            });
            localStorage.clear();
            window.location.href = '/templates/login.html';
        });
    </script>
</body>
</html>
