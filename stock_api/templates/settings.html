<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统设置 - 股票系统管理后台</title>
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f5f7fa; }
        .sidebar { background: #343a40; min-height: 100vh; position: fixed; width: 220px; }
        .sidebar a { color: #adb5bd; text-decoration: none; padding: 12px 20px; display: block; }
        .sidebar a:hover, .sidebar a.active { background: #495057; color: white; }
        .main-content { margin-left: 220px; padding: 20px; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar p-0">
                <div class="p-3 text-white text-center border-bottom border-secondary">
                    <h5><span>📈</span> 股票后台</h5>
                </div>
                <a href="/templates/dashboard.html"><span>📊</span>仪表盘</a>
                <a href="/templates/sync.html"><span>🔄</span>同步控制</a>
                <a href="/templates/stocks.html"><span>📋</span>股票列表</a>
                <a href="/templates/factors.html"><span>🧮</span>因子计算</a>
                <a href="/templates/strategy.html"><span>⚡</span>选股策略</a>
                <a href="/templates/data_management.html"><span>💾</span>数据管理</a>
                <a href="/templates/monitor.html"><span>🔔</span>监控告警</a>
                <a href="/templates/settings.html" class="active"><span>⚙️</span>系统设置</a>
                <a href="#" id="logoutBtn"><span>🚪</span>退出登录</a>
            </div>
            
            <div class="col-md-10 main-content">
                <h4 class="mb-4">系统设置</h4>
                
                <!-- 系统信息 -->
                <div class="card mb-4">
                    <div class="card-body">
                        <h5 class="card-title">系统信息</h5>
                        <div class="row mt-3">
                            <div class="col-md-3">
                                <p class="text-muted mb-1">版本</p>
                                <h5 id="sysVersion">-</h5>
                            </div>
                            <div class="col-md-3">
                                <p class="text-muted mb-1">股票数量</p>
                                <h5 id="sysStocks">-</h5>
                            </div>
                            <div class="col-md-3">
                                <p class="text-muted mb-1">记录数量</p>
                                <h5 id="sysRecords">-</h5>
                            </div>
                            <div class="col-md-3">
                                <p class="text-muted mb-1">运行时间</p>
                                <h5 id="sysUptime">-</h5>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 用户管理 -->
                <div class="card mb-4">
                    <div class="card-body">
                        <h5 class="card-title">用户管理</h5>
                        <div class="row mt-3">
                            <div class="col-md-3">
                                <input type="text" class="form-control" id="newUsername" placeholder="用户名">
                            </div>
                            <div class="col-md-3">
                                <input type="password" class="form-control" id="newPassword" placeholder="密码">
                            </div>
                            <div class="col-md-3">
                                <select class="form-select" id="newRole">
                                    <option value="user">普通用户</option>
                                    <option value="admin">管理员</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <button class="btn btn-primary" onclick="createUser()">创建用户</button>
                            </div>
                        </div>
                        
                        <table class="table table-hover mt-3" id="usersTable">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>用户名</th>
                                    <th>角色</th>
                                    <th>状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                        <nav><ul class="pagination pagination-sm" id="usersPagination"></ul></nav>
                    </div>
                </div>
                
                <!-- API Keys -->
                <div class="card mb-4">
                    <div class="card-body">
                        <h5 class="card-title">API Keys</h5>
                        <div class="row mt-3">
                            <div class="col-md-8">
                                <input type="text" class="form-control" id="apiKeyName" placeholder="名称">
                            </div>
                            <div class="col-md-4">
                                <button class="btn btn-success" onclick="createApiKey()">创建API Key</button>
                            </div>
                        </div>
                        <div id="apiKeyResult" class="mt-3"></div>
                    </div>
                </div>
                
                <!-- 同步配置 -->
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">同步配置</h5>
                        <table class="table table-sm mt-3" id="syncConfigTable">
                            <thead>
                                <tr>
                                    <th>数据源</th>
                                    <th>间隔(分钟)</th>
                                    <th>状态</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/templates/login.html';
        
        async function loadSystemInfo() {
            try {
                const res = await fetch(API_BASE + '/api/admin/settings/info', {
                    headers: {'Authorization': 'Bearer ' + token}
                });
                const data = await res.json();
                
                document.getElementById('sysVersion').textContent = data.version || '-';
                document.getElementById('sysStocks').textContent = data.stock_count || 0;
                document.getElementById('sysRecords').textContent = (data.record_count || 0).toLocaleString();
                document.getElementById('sysUptime').textContent = data.uptime || '-';
            } catch (err) {
                console.error(err);
            }
        }
        
        let usersData = [];
        const PAGE_SIZE = 10;
        let currentPage = 1;
        
        async function loadUsers() {
            try {
                const res = await fetch(API_BASE + '/api/admin/settings/users', {
                    headers: {'Authorization': 'Bearer ' + token}
                });
                const data = await res.json();
                usersData = data;
                renderUsersPage(1);
            } catch (err) {
                console.error(err);
            }
        }
        
        function renderUsersPage(page) {
            currentPage = page;
            const start = (page - 1) * PAGE_SIZE;
            const end = start + PAGE_SIZE;
            const pageData = usersData.slice(start, end);
            
            const roleMap = { 'admin': '管理员', 'user': '普通用户' };
            
            document.querySelector('#usersTable tbody').innerHTML = pageData.map(u => `
                <tr>
                    <td>${u.id}</td>
                    <td>${u.username}</td>
                    <td>${roleMap[u.role] || u.role}</td>
                    <td><span class="badge bg-${u.is_active ? 'success' : 'secondary'}">${u.is_active ? '正常' : '禁用'}</span></td>
                    <td>
                        <button class="btn btn-sm btn-danger" onclick="deleteUser(${u.id})">删除</button>
                    </td>
                </tr>
            `).join('');
            
            renderUsersPagination();
        }
        
        function renderUsersPagination() {
            const totalPages = Math.ceil(usersData.length / PAGE_SIZE);
            const pagination = document.getElementById('usersPagination');
            if (!pagination) return;
            
            let html = '';
            if (totalPages > 1) {
                html += `<li class="page-item ${currentPage === 1 ? 'disabled' : ''}"><a class="page-link" href="#" onclick="renderUsersPage(${currentPage - 1}); return false;">上一页</a></li>`;
                for (let i = 1; i <= totalPages; i++) {
                    if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                        html += `<li class="page-item ${i === currentPage ? 'active' : ''}"><a class="page-link" href="#" onclick="renderUsersPage(${i}); return false;">${i}</a></li>`;
                    } else if (i === currentPage - 3 || i === currentPage + 3) {
                        html += `<li class="page-item disabled"><span class="page-link">...</span></li>`;
                    }
                }
                html += `<li class="page-item ${currentPage === totalPages ? 'disabled' : ''}"><a class="page-link" href="#" onclick="renderUsersPage(${currentPage + 1}); return false;">下一页</a></li>`;
            }
            pagination.innerHTML = html;
        }
        
        async function createUser() {
            const username = document.getElementById('newUsername').value;
            const password = document.getElementById('newPassword').value;
            const role = document.getElementById('newRole').value;
            
            try {
                const res = await fetch(API_BASE + '/api/admin/settings/users?username=' + username + 
                    '&password=' + password + '&role=' + role, {
                    method: 'POST',
                    headers: {'Authorization': 'Bearer ' + token}
                });
                alert('用户创建成功');
                loadUsers();
            } catch (err) {
                alert('创建失败');
            }
        }
        
        async function deleteUser(userId) {
            if (!confirm('确定删除该用户?')) return;
            alert('功能开发中');
        }
        
        async function createApiKey() {
            const name = document.getElementById('apiKeyName').value;
            if (!name) { alert('请输入名称'); return; }
            
            document.getElementById('apiKeyResult').innerHTML = '<div class="alert alert-info">功能开发中</div>';
        }
        
        async function loadSyncConfig() {
            // 简化
            document.querySelector('#syncConfigTable tbody').innerHTML = `
                <tr><td>AkShare</td><td>60</td><td><span class="badge bg-success">启用</span></td></tr>
                <tr><td>股票基本信息</td><td>3600</td><td><span class="badge bg-success">启用</span></td></tr>
            `;
        }
        
        loadSystemInfo();
        loadUsers();
        loadSyncConfig();
        
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await fetch(API_BASE + '/api/auth/logout', {
                method: 'POST',
                headers: {'Authorization': 'Bearer ' + token}
            });
            localStorage.clear();
            window.location.href = '/templates/login.html';
        });
    </script>
</body>
</html>
