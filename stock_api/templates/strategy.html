<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选股策略 - 股票系统管理后台</title>
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/bootstrap-icons.css" rel="stylesheet">
    <script src="/static/js/chart.min.js"></script>
    <style>
        body { background: #f5f7fa; }
        .sidebar { background: #343a40; min-height: 100vh; position: fixed; width: 220px; }
        .sidebar a { color: #adb5bd; text-decoration: none; padding: 12px 20px; display: block; }
        .sidebar a:hover, .sidebar a.active { background: #495057; color: white; }
        .stat-card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .main-content { margin-left: 220px; padding: 20px; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <div class="col-md-2 sidebar p-0">
                <div class="p-3 text-white text-center border-bottom border-secondary">
                    <h5><i class="bi bi-graph-up-arrow"></i> 股票后台</h5>
                </div>
                <a href="/templates/dashboard.html"><i class="bi bi-grid me-2"></i>仪表盘</a>
                <a href="/templates/sync.html"><i class="bi bi-arrow-repeat me-2"></i>同步控制</a>
                <a href="/templates/stocks.html"><i class="bi bi-collection me-2"></i>股票列表</a>
                <a href="/templates/factors.html"><i class="bi bi-calculator me-2"></i>因子计算</a>
                <a href="/templates/data_management.html"><i class="bi bi-database me-2"></i>数据管理</a>
                <a href="/templates/strategy.html" class="active"><i class="bi bi-lightning me-2"></i>选股策略</a>
                <a href="/templates/monitor.html"><i class="bi bi-bell me-2"></i>监控告警</a>
                <a href="/templates/settings.html"><i class="bi bi-gear me-2"></i>系统设置</a>
                <a href="#" id="logoutBtn"><i class="bi bi-box-arrow-right me-2"></i>退出登录</a>
            </div>
            
            <!-- 主内容 -->
            <div class="col-md-10 main-content">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4><i class="bi bi-lightning"></i> 选股策略</h4>
                    <button class="btn btn-sm btn-outline-secondary" onclick="loadSignals()">
                        <i class="bi bi-arrow-clockwise"></i> 刷新
                    </button>
                </div>
                
                <!-- Tab导航 -->
                <ul class="nav nav-tabs mb-4" id="strategyTab" role="tablist">
                    <li class="nav-item">
                        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#signals">
                            <i class="bi bi-broadcast"></i> 选股信号
                        </button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#backtest">
                            <i class="bi bi-graph-up"></i> 策略回测
                        </button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#recommend">
                            <i class="bi bi-star"></i> 持仓推荐
                        </button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#portfolio">
                            <i class="bi bi-wallet2"></i> 模拟组合
                        </button>
                    </li>
                </ul>
                
                <!-- Tab内容 -->
                <div class="tab-content">
                    <!-- 选股信号 -->
                    <div class="tab-pane fade show active" id="signals">
                        <div class="card stat-card">
                            <div class="card-body">
                                <h5 class="card-title">选股信号</h5>
                                <div class="table-responsive mt-3">
                                    <table class="table table-hover">
                                        <thead>
                                            <tr>
                                                <th>股票代码</th>
                                                <th>信号类型</th>
                                                <th>信号强度</th>
                                                <th>日期</th>
                                                <th>操作</th>
                                            </tr>
                                        </thead>
                                        <tbody id="signalsTable">
                                            <tr><td colspan="5" class="text-muted">加载中...</td></tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 策略回测 -->
                    <div class="tab-pane fade" id="backtest">
                        <div class="card stat-card mb-4">
                            <div class="card-body">
                                <h5 class="card-title">回测参数</h5>
                                <div class="row mt-3">
                                    <div class="col-md-3">
                                        <label class="form-label">策略</label>
                                        <select class="form-select" id="backtestStrategy">
                                            <option value="low_volatility">低波动策略</option>
                                            <option value="high_dividend">高股息策略</option>
                                            <option value="pe_roe">PE-ROE策略</option>
                                        </select>
                                    </div>
                                    <div class="col-md-3">
                                        <label class="form-label">开始日期</label>
                                        <input type="date" class="form-control" id="backtestStart" value="2025-01-01">
                                    </div>
                                    <div class="col-md-3">
                                        <label class="form-label">结束日期</label>
                                        <input type="date" class="form-control" id="backtestEnd" value="2025-12-31">
                                    </div>
                                    <div class="col-md-3">
                                        <label class="form-label">初始资金</label>
                                        <input type="number" class="form-control" id="backtestCapital" value="100000">
                                    </div>
                                </div>
                                <div class="mt-3">
                                    <button class="btn btn-primary" onclick="runBacktest()">
                                        <i class="bi bi-play-fill"></i> 开始回测
                                    </button>
                                </div>
                            </div>
                        </div>
                        
                        <div class="card stat-card" id="backtestResult" style="display:none;">
                            <div class="card-body">
                                <h5 class="card-title">回测结果</h5>
                                <div class="row mt-3">
                                    <div class="col-md-3">
                                        <div class="text-muted">总收益</div>
                                        <h3 id="btTotalReturn" class="text-success">-</h3>
                                    </div>
                                    <div class="col-md-3">
                                        <div class="text-muted">年化收益</div>
                                        <h3 id="btAnnualReturn" class="text-success">-</h3>
                                    </div>
                                    <div class="col-md-3">
                                        <div class="text-muted">夏普比率</div>
                                        <h3 id="btSharpe">-</h3>
                                    </div>
                                    <div class="col-md-3">
                                        <div class="text-muted">最大回撤</div>
                                        <h3 id="btMaxDrawdown" class="text-danger">-</h3>
                                    </div>
                                </div>
                                <div class="mt-3">
                                    <canvas id="backtestChart" height="80"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 持仓推荐 -->
                    <div class="tab-pane fade" id="recommend">
                        <div class="card stat-card">
                            <div class="card-body">
                                <h5 class="card-title">持仓推荐</h5>
                                <div class="row mt-3 mb-3">
                                    <div class="col-md-4">
                                        <label class="form-label">策略</label>
                                        <select class="form-select" id="recommendStrategy">
                                            <option value="low_volatility">低波动策略</option>
                                            <option value="high_dividend">高股息策略</option>
                                            <option value="pe_roe">PE-ROE策略</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label">推荐数量</label>
                                        <input type="number" class="form-control" id="recommendTopN" value="10" min="1" max="50">
                                    </div>
                                    <div class="col-md-4 d-flex align-items-end">
                                        <button class="btn btn-primary" onclick="getRecommendations()">
                                            <i class="bi bi-search"></i> 获取推荐
                                        </button>
                                    </div>
                                </div>
                                <div class="table-responsive">
                                    <table class="table table-hover">
                                        <thead>
                                            <tr>
                                                <th>排名</th>
                                                <th>股票代码</th>
                                                <th>股票名称</th>
                                                <th>评分</th>
                                                <th>建议仓位</th>
                                            </tr>
                                        </thead>
                                        <tbody id="recommendTable">
                                            <tr><td colspan="5" class="text-muted">请选择策略并获取推荐</td></tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 模拟组合 -->
                    <div class="tab-pane fade" id="portfolio">
                        <div class="card stat-card">
                            <div class="card-body">
                                <h5 class="card-title">模拟组合</h5>
                                <div class="row mt-3">
                                    <div class="col-md-4">
                                        <label class="form-label">初始资金</label>
                                        <input type="number" class="form-control" id="portfolioCapital" value="100000">
                                    </div>
                                    <div class="col-md-4 d-flex align-items-end">
                                        <button class="btn btn-primary" onclick="getPortfolio()">
                                            <i class="bi bi-wallet2"></i> 获取组合
                                        </button>
                                    </div>
                                </div>
                                <div class="table-responsive mt-3">
                                    <table class="table table-hover">
                                        <thead>
                                            <tr>
                                                <th>股票代码</th>
                                                <th>股票名称</th>
                                                <th>持仓数量</th>
                                                <th>持仓成本</th>
                                                <th>当前价格</th>
                                                <th>盈亏</th>
                                            </tr>
                                        </thead>
                                        <tbody id="portfolioTable">
                                            <tr><td colspan="6" class="text-muted">暂无持仓</td></tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="/static/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = '';
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/templates/login.html';
        
        // 加载选股信号
        async function loadSignals() {
            try {
                const res = await fetch(API_BASE + '/api/admin/strategy/signals', {
                    headers: {'Authorization': 'Bearer ' + token}
                });
                const signals = await res.json();
                
                const tbody = document.getElementById('signalsTable');
                if (signals.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-muted">暂无信号</td></tr>';
                    return;
                }
                
                tbody.innerHTML = signals.map(s => `
                    <tr>
                        <td>${s.ts_code || '-'}</td>
                        <td><span class="badge bg-info">${s.signal_type || '-'}</span></td>
                        <td>${s.strength || '-'}</td>
                        <td>${s.date || '-'}</td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary" onclick="viewStock('${s.ts_code}')">详情</button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                document.getElementById('signalsTable').innerHTML = 
                    '<tr><td colspan="5" class="text-danger">加载失败</td></tr>';
            }
        }
        
        // 运行回测
        async function runBacktest() {
            const strategy = document.getElementById('backtestStrategy').value;
            const startDate = document.getElementById('backtestStart').value.replace(/-/g, '');
            const endDate = document.getElementById('backtestEnd').value.replace(/-/g, '');
            const capital = document.getElementById('backtestCapital').value;
            
            try {
                const res = await fetch(API_BASE + '/api/admin/strategy/backtest?strategy=' + strategy + 
                    '&start_date=' + startDate + '&end_date=' + endDate + '&initial_capital=' + capital, {
                    headers: {'Authorization': 'Bearer ' + token}
                });
                const result = await res.json();
                
                document.getElementById('backtestResult').style.display = 'block';
                document.getElementById('btTotalReturn').textContent = (result.total_return || 0).toFixed(2) + '%';
                document.getElementById('btAnnualReturn').textContent = (result.annual_return || 0).toFixed(2) + '%';
                document.getElementById('btSharpe').textContent = (result.sharpe_ratio || 0).toFixed(2);
                document.getElementById('btMaxDrawdown').textContent = (result.max_drawdown || 0).toFixed(2) + '%';
                
            } catch (err) {
                alert('回测失败: ' + err.message);
            }
        }
        
        // 获取推荐
        async function getRecommendations() {
            const strategy = document.getElementById('recommendStrategy').value;
            const topN = document.getElementById('recommendTopN').value;
            
            try {
                const res = await fetch(API_BASE + '/api/admin/strategy/recommendations?strategy=' + strategy + 
                    '&top_n=' + topN, {
                    headers: {'Authorization': 'Bearer ' + token}
                });
                const stocks = await res.json();
                
                const tbody = document.getElementById('recommendTable');
                if (stocks.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-muted">暂无推荐</td></tr>';
                    return;
                }
                
                tbody.innerHTML = stocks.map((s, i) => `
                    <tr>
                        <td>${i + 1}</td>
                        <td>${s.ts_code || '-'}</td>
                        <td>${s.name || '-'}</td>
                        <td><span class="badge bg-success">${s.score?.toFixed(2) || '-'}</span></td>
                        <td>${s.weight || '-'}%</td>
                    </tr>
                `).join('');
            } catch (err) {
                document.getElementById('recommendTable').innerHTML = 
                    '<tr><td colspan="5" class="text-danger">加载失败</td></tr>';
            }
        }
        
        // 获取组合
        async function getPortfolio() {
            const capital = document.getElementById('portfolioCapital').value;
            
            try {
                const res = await fetch(API_BASE + '/api/admin/strategy/portfolio?initial_capital=' + capital, {
                    headers: {'Authorization': 'Bearer ' + token}
                });
                const portfolio = await res.json();
                
                const tbody = document.getElementById('portfolioTable');
                if (!portfolio.positions || portfolio.positions.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-muted">暂无持仓</td></tr>';
                    return;
                }
                
                tbody.innerHTML = portfolio.positions.map(p => `
                    <tr>
                        <td>${p.ts_code || '-'}</td>
                        <td>${p.name || '-'}</td>
                        <td>${p.quantity || 0}</td>
                        <td>${p.cost || 0}</td>
                        <td>${p.price || 0}</td>
                        <td class="${(p.pnl || 0) >= 0 ? 'text-success' : 'text-danger'}">
                            ${(p.pnl || 0).toFixed(2)}
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                document.getElementById('portfolioTable').innerHTML = 
                    '<tr><td colspan="6" class="text-danger">加载失败</td></tr>';
            }
        }
        
        // 查看股票详情
        function viewStock(code) {
            location.href = '/templates/stock_detail.html?code=' + code;
        }
        
        // 初始化
        loadSignals();
        
        // 退出登录
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await fetch(API_BASE + '/api/auth/logout', {
                method: 'POST',
                headers: {'Authorization': 'Bearer ' + token}
            });
            localStorage.clear();
            window.location.href = '/templates/login.html';
        });
    </script>
</body>
</html>
