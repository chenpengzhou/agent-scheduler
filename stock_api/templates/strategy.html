<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选股策略 - 股票系统管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f5f7fa; }
        .sidebar { background: #343a40; min-height: 100vh; }
        .sidebar a { color: #adb5bd; text-decoration: none; padding: 12px 20px; display: block; }
        .sidebar a:hover, .sidebar a.active { background: #495057; color: white; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar p-0">
                <div class="p-3 text-white text-center border-bottom border-secondary">
                    <h5>股票管理后台</h5>
                </div>
                <a href="/templates/dashboard.html"><i class="bi bi-grid me-2"></i>数据总览</a>
                <a href="/templates/sync.html"><i class="bi bi-arrow-repeat me-2"></i>同步控制</a>
                <a href="/templates/stocks.html"><i class="bi bi-collection me-2"></i>股票列表</a>
                <a href="/templates/factors.html"><i class="bi bi-graph-up me-2"></i>因子展示</a>
                <a href="/templates/data_management.html"><i class="bi bi-database me-2"></i>数据管理</a>
                <a href="/templates/strategy.html" class="active"><i class="bi bi-lightning me-2"></i>选股策略</a>
                <a href="/templates/monitor.html"><i class="bi bi-bell me-2"></i>监控告警</a>
                <a href="/templates/settings.html"><i class="bi bi-gear me-2"></i>系统设置</a>
                <a href="#" id="logoutBtn"><i class="bi bi-box-arrow-right me-2"></i>退出登录</a>
            </div>
            
            <div class="col-md-10 p-4">
                <h4 class="mb-4">选股策略</h4>
                
                <!-- 信号展示 -->
                <div class="card mb-4">
                    <div class="card-body">
                        <h5 class="card-title">选股信号</h5>
                        <div class="mb-3">
                            <input type="text" class="form-control" id="signalCodes" placeholder="股票代码(逗号分隔)">
                        </div>
                        <button class="btn btn-primary" onclick="loadSignals()">查询信号</button>
                        
                        <table class="table table-hover mt-3" id="signalsTable">
                            <thead>
                                <tr>
                                    <th>代码</th>
                                    <th>价格</th>
                                    <th>信号</th>
                                    <th>置信度</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
                
                <!-- 持仓推荐 -->
                <div class="card mb-4">
                    <div class="card-body">
                        <h5 class="card-title">持仓推荐</h5>
                        <div class="row">
                            <div class="col-md-4">
                                <select class="form-select" id="strategyType">
                                    <option value="low_volatility">低波动策略</option>
                                    <option value="high_dividend">高股息策略</option>
                                    <option value="value">价值策略</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <input type="number" class="form-control" id="topN" value="10" placeholder="推荐数量">
                            </div>
                            <div class="col-md-4">
                                <button class="btn btn-success" onclick="loadRecommendations()">获取推荐</button>
                            </div>
                        </div>
                        
                        <table class="table table-hover mt-3" id="recTable">
                            <thead>
                                <tr>
                                    <th>代码</th>
                                    <th>价格</th>
                                    <th>评分</th>
                                    <th>权重</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
                
                <!-- 模拟交易 -->
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">模拟交易</h5>
                        <div class="row">
                            <div class="col-md-3">
                                <input type="text" class="form-control" id="tradeCode" placeholder="股票代码">
                            </div>
                            <div class="col-md-2">
                                <select class="form-select" id="tradeAction">
                                    <option value="buy">买入</option>
                                    <option value="sell">卖出</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <input type="number" class="form-control" id="tradeQty" placeholder="数量">
                            </div>
                            <div class="col-md-4">
                                <button class="btn btn-warning" onclick="simulateTrade()">执行</button>
                            </div>
                        </div>
                        <div id="tradeResult" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/templates/login.html';
        
        async function loadSignals() {
            const codes = document.getElementById('signalCodes').value;
            const url = codes ? '/api/admin/strategy/signals?codes=' + codes : '/api/admin/strategy/signals';
            
            try {
                const res = await fetch(API_BASE + url, {
                    headers: {'Authorization': 'Bearer ' + token}
                });
                const data = await res.json();
                
                const tbody = document.querySelector('#signalsTable tbody');
                tbody.innerHTML = data.map(s => `
                    <tr>
                        <td>${s.code}</td>
                        <td>${s.close}</td>
                        <td><span class="badge bg-${s.signal === 'buy' ? 'success' : s.signal === 'sell' ? 'danger' : 'secondary'}">${s.signal}</span></td>
                        <td>${(s.confidence * 100).toFixed(0)}%</td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }
        
        async function loadRecommendations() {
            const strategy = document.getElementById('strategyType').value;
            const topN = document.getElementById('topN').value;
            
            try {
                const res = await fetch(API_BASE + '/api/admin/strategy/recommendations?strategy=' + strategy + '&top_n=' + topN, {
                    headers: {'Authorization': 'Bearer ' + token}
                });
                const data = await res.json();
                
                const tbody = document.querySelector('#recTable tbody');
                tbody.innerHTML = data.map(r => `
                    <tr>
                        <td>${r.code}</td>
                        <td>${r.close}</td>
                        <td><span class="badge bg-primary">${r.score}</span></td>
                        <td>${r.weight}%</td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }
        
        async function simulateTrade() {
            const code = document.getElementById('tradeCode').value;
            const action = document.getElementById('tradeAction').value;
            const qty = document.getElementById('tradeQty').value;
            
            try {
                const res = await fetch(API_BASE + '/api/admin/strategy/trade', {
                    method: 'POST',
                    headers: {'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json'},
                    body: JSON.stringify({code, action, quantity: parseInt(qty)})
                });
                const data = await res.json();
                
                document.getElementById('tradeResult').innerHTML = `
                    <div class="alert alert-success">
                        ${action === 'buy' ? '买入' : '卖出'} ${code} ${qty}股 @ ${data.price} = ¥${data.amount}
                    </div>
                `;
            } catch (err) {
                alert('交易失败');
            }
        }
        
        loadSignals();
        
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await fetch(API_BASE + '/api/auth/logout', {
                method: 'POST',
                headers: {'Authorization': 'Bearer ' + token}
            });
            localStorage.clear();
            window.location.href = '/templates/login.html';
        });
    </script>
</body>
</html>
