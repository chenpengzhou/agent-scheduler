<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>因子展示 - 股票系统管理后台</title>
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/bootstrap-icons.css" rel="stylesheet">
    <script src="/static/js/chart.min.js"></script>
    <style>
        body { background: #f5f7fa; }
        .sidebar { background: #343a40; min-height: 100vh; position: fixed; width: 220px; }
        .sidebar a { color: #adb5bd; text-decoration: none; padding: 12px 20px; display: block; }
        .sidebar a:hover, .sidebar a.active { background: #495057; color: white; }
        .main-content { margin-left: 220px; padding: 20px; }
        .factor-card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <div class="col-md-2 sidebar p-0">
                <div class="p-3 text-white text-center border-bottom border-secondary">
                    <h5><span>📈</span> 股票后台</h5>
                </div>
                <a href="/templates/dashboard.html"><span>📊</span>仪表盘</a>
                <a href="/templates/sync.html"><span>🔄</span>同步控制</a>
                <a href="/templates/stocks.html"><span>📋</span>股票列表</a>
                <a href="/templates/factors.html" class="active"><span>🧮</span>因子计算</a>
                <a href="/templates/strategy.html"><span>⚡</span>选股策略</a>
                <a href="/templates/data_management.html"><span>💾</span>数据管理</a>
                <a href="/templates/monitor.html"><span>🔔</span>监控告警</a>
                <a href="/templates/settings.html"><span>⚙️</span>系统设置</a>
                <a href="#" id="logoutBtn"><span>🚪</span>退出登录</a>
            </div>
            
            <!-- 主内容 -->
            <div class="col-md-10 main-content">
                <h4 class="mb-4">因子展示</h4>
                
                <!-- 搜索 -->
                <div class="card mb-4">
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-4">
                                <input type="text" class="form-control" id="codeInput" placeholder="输入股票代码，如 600000">
                            </div>
                            <div class="col-md-2">
                                <button class="btn btn-primary w-100" id="searchBtn">
                                    <span>🔍</span>查询因子
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 因子展示 -->
                <div id="factorContent" style="display:none;">
                    <h5 id="factorTitle" class="mb-3">600000.SH 因子数据</h5>
                    
                    <!-- 因子卡片 -->
                    <div class="row mb-4">
                        <div class="col-md-3">
                            <div class="card factor-card">
                                <div class="card-body text-center">
                                    <div class="text-muted">市盈率 (PE)</div>
                                    <h2 id="peFactor" class="mb-0 text-primary">-</h2>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card factor-card">
                                <div class="card-body text-center">
                                    <div class="text-muted">市净率 (PB)</div>
                                    <h2 id="pbFactor" class="mb-0 text-info">-</h2>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card factor-card">
                                <div class="card-body text-center">
                                    <div class="text-muted">20日波动率</div>
                                    <h2 id="volFactor" class="mb-0 text-warning">-</h2>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card factor-card">
                                <div class="card-body text-center">
                                    <div class="text-muted">最新收盘价</div>
                                    <h2 id="closeFactor" class="mb-0">-</h2>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 均线因子 -->
                    <div class="card mb-4">
                        <div class="card-body">
                            <h5 class="card-title">移动平均线</h5>
                            <div class="row text-center mt-3">
                                <div class="col-md-4">
                                    <div class="text-muted">MA5</div>
                                    <h4 id="ma5Factor">-</h4>
                                </div>
                                <div class="col-md-4">
                                    <div class="text-muted">MA10</div>
                                    <h4 id="ma10Factor">-</h4>
                                </div>
                                <div class="col-md-4">
                                    <div class="text-muted">MA20</div>
                                    <h4 id="ma20Factor">-</h4>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 图表 -->
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">价格与均线</h5>
                            <canvas id="factorChart" height="100"></canvas>
                        </div>
                    </div>
                </div>
                
                <div id="noData" class="text-center text-muted py-5">
                    请输入股票代码查询因子数据
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/templates/login.html';
        
        let chart = null;
        
        async function loadFactors(code) {
            try {
                const res = await fetch(API_BASE + '/api/admin/factors/' + code, {
                    headers: {'Authorization': 'Bearer ' + token}
                });
                
                if (!res.ok) {
                    alert('未找到股票数据');
                    return;
                }
                
                const data = await res.json();
                
                document.getElementById('factorContent').style.display = 'block';
                document.getElementById('noData').style.display = 'none';
                
                document.getElementById('factorTitle').textContent = code + ' 因子数据';
                
                // 因子值
                document.getElementById('peFactor').textContent = data.pe || '-';
                document.getElementById('pbFactor').textContent = data.pb || '-';
                document.getElementById('volFactor').textContent = (data.volatility_20d || '-') + '%';
                document.getElementById('closeFactor').textContent = data.close || '-';
                
                document.getElementById('ma5Factor').textContent = data.ma5 || '-';
                document.getElementById('ma10Factor').textContent = data.ma10 || '-';
                document.getElementById('ma20Factor').textContent = data.ma20 || '-';
                
                // 渲染图表
                renderChart(data.history);
                
            } catch (err) {
                console.error(err);
                alert('查询失败');
            }
        }
        
        function renderChart(history) {
            const ctx = document.getElementById('factorChart').getContext('2d');
            
            if (chart) chart.destroy();
            
            const labels = history.map(h => h.date).reverse();
            const close = history.map(h => h.close).reverse();
            
            // 简化均线计算
            const calcMA = (arr, n) => {
                let result = [];
                for (let i = 0; i < arr.length; i++) {
                    if (i < n - 1) result.push(null);
                    else {
                        let sum = 0;
                        for (let j = 0; j < n; j++) sum += arr[i - j];
                        result.push(sum / n);
                    }
                }
                return result;
            };
            
            const ma5 = calcMA(close, 5);
            const ma10 = calcMA(close, 10);
            const ma20 = calcMA(close, 20);
            
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: '收盘价', data: close, borderColor: '#667eea', tension: 0.4 },
                        { label: 'MA5', data: ma5, borderColor: '#f59e0b', borderDash: [5, 5] },
                        { label: 'MA10', data: ma10, borderColor: '#10b981', borderDash: [5, 5] },
                        { label: 'MA20', data: ma20, borderColor: '#ef4444', borderDash: [5, 5] }
                    ]
                },
                options: { responsive: true }
            });
        }
        
        document.getElementById('searchBtn').addEventListener('click', () => {
            const code = document.getElementById('codeInput').value.trim();
            if (code) loadFactors(code);
        });
        
        document.getElementById('codeInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const code = e.target.value.trim();
                if (code) loadFactors(code);
            }
        });
        
        // 退出登录
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await fetch(API_BASE + '/api/auth/logout', {
                method: 'POST',
                headers: {'Authorization': 'Bearer ' + token}
            });
            localStorage.clear();
            window.location.href = '/templates/login.html';
        });
    </script>
</body>
</html>
